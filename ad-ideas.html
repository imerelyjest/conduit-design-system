<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Conduit · Facebook ad wireframes</title>
  <link rel="stylesheet" href="./colors_and_type.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  <style>
    html, body { margin:0; padding:0; background:#f4f1ea; min-height:100%; }
    body { font-family: var(--sans-body); color:#171717; }

    /* Wireframe primitives ------------------------------------------- */
    .wf {
      --ink: #1a1a1a;
      --paper: #fbfaf6;
      --hatch: rgba(20,20,20,0.08);
      --accent: #FF4529;
      --muted: #7a7a7a;
      background: var(--paper);
      color: var(--ink);
      position: relative;
      overflow: hidden;
    }
    .wf--clean {
      --paper: #FBFBFE;
      --hatch: rgba(20,30,60,0.04);
    }
    .wf--dark {
      --ink: #FBFBFE;
      --paper: #212121;
      --hatch: rgba(255,255,255,0.07);
      --muted: #9a9a9a;
    }
    .wf .hand { font-family: 'Caveat', 'Patrick Hand', cursive; font-weight:700; }
    .wf .print { font-family: 'Patrick Hand', cursive; }
    .wf .mono  { font-family: var(--mono); letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; color: var(--muted); }

    /* Hatched image-placeholder */
    .box {
      position: relative;
      border: 1.5px solid var(--ink);
      background-image:
        repeating-linear-gradient(45deg, var(--hatch) 0 1.5px, transparent 1.5px 9px);
      display: flex; align-items:center; justify-content:center;
      text-align:center;
    }
    .box::before, .box::after { /* X cross for image placeholders */
      content:""; position:absolute; inset:0; pointer-events:none;
    }
    .box.x::before { background:
        linear-gradient(to top right, transparent calc(50% - 0.5px), var(--ink) calc(50% - 0.5px), var(--ink) calc(50% + 0.5px), transparent calc(50% + 0.5px));
        opacity:.55;
    }
    .box.x::after { background:
        linear-gradient(to top left, transparent calc(50% - 0.5px), var(--ink) calc(50% - 0.5px), var(--ink) calc(50% + 0.5px), transparent calc(50% + 0.5px));
        opacity:.55;
    }
    .box .tag { position:relative; z-index:2; background: var(--paper); padding: 2px 8px; font-family: var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; border:1px solid var(--ink); }

    /* Sketchy borders made with double-stroke + slight offset */
    .sketch {
      border: 1.5px solid var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      background: var(--paper);
    }
    .pill {
      border:1.25px solid var(--ink); border-radius:9999px;
      padding: 4px 10px; display:inline-flex; align-items:center; gap:6px;
      font-family: var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
      background: var(--paper);
    }
    .pill .dot { width:6px; height:6px; background: var(--accent); border-radius:9999px; }
    .pill--dark { background: var(--ink); color: var(--paper); border-color:var(--ink); }

    .cta {
      border:1.5px solid var(--ink); background: var(--ink); color: var(--paper);
      padding: 8px 14px; border-radius:9999px;
      font-family: var(--sans-body); font-weight:600; font-size:13px;
      display:inline-flex; align-items:center; gap:8px;
      box-shadow: 2px 2px 0 var(--accent);
    }
    .cta--accent { background: var(--accent); border-color: var(--accent); color:#fff; box-shadow: 2px 2px 0 var(--ink); }

    /* Accent toggle */
    .wf--no-accent { --accent: var(--ink); }

    /* Squiggly underline (hand-drawn highlight) */
    .squiggle { position:relative; display:inline-block; white-space: nowrap; }
    .squiggle::after {
      content:""; position:absolute; left:-2px; right:-2px; bottom:-2px; height:6px;
      background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 6'><path d='M0 3 Q 5 0 10 3 T 20 3 T 30 3 T 40 3 T 50 3 T 60 3' fill='none' stroke='%23FF4529' stroke-width='2' stroke-linecap='round'/></svg>") repeat-x;
      background-size: 60px 6px;
      opacity: 1;
    }
    .wf--no-accent .squiggle::after { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 6'><path d='M0 3 Q 5 0 10 3 T 20 3 T 30 3 T 40 3 T 50 3 T 60 3' fill='none' stroke='%231a1a1a' stroke-width='2' stroke-linecap='round'/></svg>"); }

    /* Arrow */
    .arrow { display:inline-block; }

    /* Tiny phone frame for reel storyboard cells */
    .phone {
      width: 168px; height: 300px;
      border: 1.5px solid var(--ink); border-radius: 18px;
      background: var(--paper); position:relative; overflow:hidden;
      display:flex; flex-direction:column;
    }
    .phone .notch { position:absolute; top:6px; left:50%; transform:translateX(-50%); width:34px; height:4px; background:var(--ink); border-radius:9999px; opacity:.5; }
    .phone .frame-label { position:absolute; bottom:6px; left:8px; font-family:var(--mono); font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
    .phone .timecode { position:absolute; top:8px; right:10px; font-family:var(--mono); font-size:9px; color:var(--muted); }

    /* Squared meta strip for reels */
    .reel-grid { display:flex; gap: 18px; align-items:flex-start; }

    /* Subtle background "paper" for the canvas */
    body { background-image:
      radial-gradient(circle at 10% 10%, rgba(0,0,0,0.025), transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(0,0,0,0.025), transparent 40%);
    }

    /* Annotation callout */
    .anno { position:absolute; font-family:'Caveat',cursive; font-size:16px; color: var(--accent); line-height:1.05; }
    .anno svg { display:block; }

    /* Spreadsheet rows */
    .ss-row { height:8px; border-top: 1px solid rgba(0,0,0,0.25); }
    .ss-row:nth-child(2n) { background: rgba(0,0,0,0.04); }

    /* Stack of "tools" */
    .toolchip { border:1.25px solid var(--ink); padding: 6px 10px; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; background:var(--paper); display:inline-block; }

    /* Top header */
    .topbar { position: fixed; top:0; left:0; right:0; z-index: 5; pointer-events:none; padding: 18px 22px; display:flex; justify-content:space-between; align-items:center; }
    .topbar .meta { font-family: var(--mono); font-size: 11px; letter-spacing:.18em; text-transform:uppercase; color: #2b2b2b; }
    .topbar .meta b { color: var(--color-primary); }

    /* When sketchy=false, smooth things out */
    .clean .sketch { box-shadow: 0 1px 2px rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.18); }
    .clean .cta { box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    .clean .box { background-image:none; background: #ECEEF3; border-color: rgba(0,0,0,0.15); }
    .clean .box.x::before, .clean .box.x::after { opacity:.18; }
    .clean .hand { font-family: var(--sans-display); font-weight: 700; letter-spacing:-0.02em; }
    .clean .print { font-family: var(--sans-body); }
    .clean .pill { border-color: rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="meta">● <b>CONDUIT</b> · FACEBOOK AD WIREFRAMES · DRAFT v1</div>
    <div class="meta">10 ideas · 6 static · 4 reels</div>
  </div>

  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ads/posts.jsx"></script>
  <script type="text/babel" src="ads/reels.jsx"></script>
  <script type="text/babel" src="ads/app.jsx"></script>
</body>
</html>
