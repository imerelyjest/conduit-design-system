<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="DM Sans, system-ui, sans-serif">
  <title>Conduit Systems — Brand Palette</title>
  <desc>Anchor colors, state colors, and gradients on a single sheet.</desc>

  
  <rect width="1600" height="900" fill="#FBFBFE"></rect>

  
  <text x="80" y="100" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="48" letter-spacing="-1.2" fill="#040316">Conduit Systems</text>
  <text x="80" y="135" font-size="18" fill="#6B7280">Brand palette · 1.0.0 · Light theme default</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#B7C8D7" stroke-opacity="0.6"></line>

  
  <text x="80" y="200" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="20" fill="#040316">Anchor colors</text>

  
  <g transform="translate(80, 220)">
    <rect width="280" height="180" rx="18" fill="#040316"></rect>
    <text x="20" y="160" font-size="14" fill="rgba(255,255,255,0.7)" font-family="ui-monospace, monospace" letter-spacing="2">TEXT · FIXED COST</text>
    <text x="20" y="40" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="22" fill="#FBFBFE">Text</text>
    <text x="20" y="68" font-family="ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.7)">#040316</text>
  </g>

  
  <g transform="translate(370, 220)">
    <rect width="280" height="180" rx="18" fill="#FBFBFE" stroke="#040316" stroke-opacity="0.08"></rect>
    <text x="20" y="160" font-size="14" fill="#6B7280" font-family="ui-monospace, monospace" letter-spacing="2">BACKGROUND · 60%</text>
    <text x="20" y="40" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="22" fill="#040316">Background</text>
    <text x="20" y="68" font-family="ui-monospace, monospace" font-size="14" fill="#6B7280">#FBFBFE</text>
  </g>

  
  <g transform="translate(660, 220)">
    <rect width="280" height="180" rx="18" fill="#FF4529"></rect>
    <text x="20" y="160" font-size="14" fill="rgba(255,255,255,0.85)" font-family="ui-monospace, monospace" letter-spacing="2">PRIMARY · 10%</text>
    <text x="20" y="40" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="22" fill="#FBFBFE">Primary</text>
    <text x="20" y="68" font-family="ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.85)">#FF4529</text>
  </g>

  
  <g transform="translate(950, 220)">
    <rect width="280" height="180" rx="18" fill="#212121"></rect>
    <text x="20" y="160" font-size="14" fill="rgba(255,255,255,0.7)" font-family="ui-monospace, monospace" letter-spacing="2">SECONDARY · 30%</text>
    <text x="20" y="40" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="22" fill="#FBFBFE">Secondary</text>
    <text x="20" y="68" font-family="ui-monospace, monospace" font-size="14" fill="rgba(255,255,255,0.7)">#212121</text>
  </g>

  
  <g transform="translate(1240, 220)">
    <rect width="280" height="180" rx="18" fill="#B7C8D7"></rect>
    <text x="20" y="160" font-size="14" fill="#040316" font-family="ui-monospace, monospace" letter-spacing="2">ACCENT · TRIM &lt; 5%</text>
    <text x="20" y="40" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="22" fill="#040316">Accent</text>
    <text x="20" y="68" font-family="ui-monospace, monospace" font-size="14" fill="#040316">#B7C8D7</text>
  </g>

  
  <text x="80" y="450" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="20" fill="#040316">State / semantic</text>

  <g transform="translate(80, 470)">
    <rect width="220" height="100" rx="14" fill="#FF5A41"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#fff">Primary tint</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="rgba(255,255,255,0.85)">#FF5A41</text>
    <text x="16" y="84" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="1.4" font-family="ui-monospace, monospace">HOVER · TOP</text>
  </g>
  <g transform="translate(310, 470)">
    <rect width="220" height="100" rx="14" fill="#E63E25"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#fff">Primary hover</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="rgba(255,255,255,0.85)">#E63E25</text>
    <text x="16" y="84" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="1.4" font-family="ui-monospace, monospace">BTN · BOTTOM</text>
  </g>
  <g transform="translate(540, 470)">
    <rect width="220" height="100" rx="14" fill="#D43820"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#fff">Primary pressed</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="rgba(255,255,255,0.85)">#D43820</text>
    <text x="16" y="84" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="1.4" font-family="ui-monospace, monospace">ACTIVE</text>
  </g>
  <g transform="translate(770, 470)">
    <rect width="220" height="100" rx="14" fill="#6B7280"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#fff">Muted</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="rgba(255,255,255,0.85)">#6B7280</text>
    <text x="16" y="84" font-size="11" fill="rgba(255,255,255,0.75)" letter-spacing="1.4" font-family="ui-monospace, monospace">CAPTIONS</text>
  </g>
  <g transform="translate(1000, 470)">
    <rect width="220" height="100" rx="14" fill="#F4F5F8" stroke="#040316" stroke-opacity="0.08"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#040316">Card soft</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="#6B7280">#F4F5F8</text>
    <text x="16" y="84" font-size="11" fill="#6B7280" letter-spacing="1.4" font-family="ui-monospace, monospace">BTN · 2ND</text>
  </g>
  <g transform="translate(1230, 470)">
    <rect width="220" height="100" rx="14" fill="#ECEEF3" stroke="#040316" stroke-opacity="0.08"></rect>
    <text x="16" y="32" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="16" fill="#040316">Card pressed</text>
    <text x="16" y="56" font-family="ui-monospace, monospace" font-size="12" fill="#6B7280">#ECEEF3</text>
    <text x="16" y="84" font-size="11" fill="#6B7280" letter-spacing="1.4" font-family="ui-monospace, monospace">ACTIVE</text>
  </g>

  
  <text x="80" y="630" font-family="Plus Jakarta Sans, sans-serif" font-weight="700" font-size="20" fill="#040316">Gradients</text>

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF4529"></stop><stop offset="1" stop-color="#212121"></stop>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF4529"></stop><stop offset="1" stop-color="#B7C8D7"></stop>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#212121"></stop><stop offset="1" stop-color="#B7C8D7"></stop>
    </linearGradient>
    <radialGradient id="g4"><stop offset="0" stop-color="#FF4529"></stop><stop offset="1" stop-color="#212121"></stop></radialGradient>
    <radialGradient id="g5"><stop offset="0" stop-color="#FF4529"></stop><stop offset="1" stop-color="#B7C8D7"></stop></radialGradient>
    <radialGradient id="g6"><stop offset="0" stop-color="#212121"></stop><stop offset="1" stop-color="#B7C8D7"></stop></radialGradient>
  </defs>

  <g transform="translate(80, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g1)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#fff" letter-spacing="1">PRIMARY → SECONDARY</text>
  </g>
  <g transform="translate(310, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g2)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#040316" letter-spacing="1">PRIMARY → ACCENT</text>
  </g>
  <g transform="translate(540, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g3)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#040316" letter-spacing="1">SECONDARY → ACCENT</text>
  </g>
  <g transform="translate(770, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g4)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#fff" letter-spacing="1">RADIAL · P→S</text>
  </g>
  <g transform="translate(1000, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g5)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#040316" letter-spacing="1">RADIAL · P→A</text>
  </g>
  <g transform="translate(1230, 650)">
    <rect width="220" height="160" rx="14" fill="url(#g6)"></rect>
    <text x="16" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#040316" letter-spacing="1">RADIAL · S→A</text>
  </g>

  
  <text x="80" y="855" font-family="ui-monospace, monospace" font-size="12" fill="#6B7280" letter-spacing="2">60 / 30 / 10  ·  BACKGROUND DOMINATES, SECONDARY SUPPORTS, PRIMARY PUNCTUATES</text>
</svg>